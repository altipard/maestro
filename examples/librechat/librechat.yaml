# LibreChat configuration for Maestro integration
# All LLM traffic routes through Maestro at http://maestro:8080/v1/

version: 1.3.6
cache: true

interface:
  customWelcome: 'Welcome to Maestro + LibreChat!'
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  bookmarks: true
  multiConvo: true
  fileSearch: true
  agents:
    use: true
    create: true

registration:
  socialLogins: []

fileConfig:
  endpoints:
    openAI:
      fileIdName: 'file_id'
      disabled: false
    custom:
      disabled: false

endpoints:
  openAI:
    baseURL: 'http://maestro:8080/v1'
    models:
      default:
        - 'qwen3.5:latest'
        - 'anthropic/claude-sonnet-4'
        - 'google/gemini-2.5-pro-preview'
        - 'deepseek/deepseek-r1'
        - 'openai/gpt-4o'
        - 'nvidia/nemotron-3-super-120b-a12b:free'
      fetch: true
    titleConvo: true
    titleModel: 'qwen3.5:latest'
  custom:
    - name: 'Maestro'
      apiKey: 'not-required'
      baseURL: 'http://maestro:8080/v1/'
      models:
        default:
          - 'qwen3.5:latest'
          - 'anthropic/claude-sonnet-4'
          - 'google/gemini-2.5-pro-preview'
          - 'deepseek/deepseek-r1'
          - 'openai/gpt-4o'
          - 'nvidia/nemotron-3-super-120b-a12b:free'
        fetch: true
      titleConvo: true
      titleModel: 'qwen3.5:latest'
      modelDisplayLabel: 'Maestro'
