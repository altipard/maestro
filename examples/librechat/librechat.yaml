# LibreChat configuration for Maestro integration
# All LLM traffic routes through Maestro at http://maestro:8080/v1/

version: 1.3.6
cache: true

interface:
  customWelcome: 'Welcome to Maestro + LibreChat!'
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  bookmarks: true
  multiConvo: true
  fileSearch: true
  agents:
    use: true
    create: true

registration:
  socialLogins: []

# RAG configuration
fileConfig:
  endpoints:
    openAI:
      fileIdName: 'file_id'
      disabled: false
    custom:
      disabled: false

endpoints:
  openAI:
    baseURL: 'http://maestro:8080/v1'
    models:
      default:
        - 'gemma3:1b'
        - 'qwen3.5:latest'
      fetch: true
    titleConvo: true
    titleModel: 'gemma3:1b'
  custom:
    - name: 'Maestro'
      apiKey: 'not-required'
      baseURL: 'http://maestro:8080/v1/'
      models:
        default:
          - 'gemma3:1b'
          - 'qwen3.5:latest'
        fetch: true
      titleConvo: true
      titleModel: 'gemma3:1b'
      modelDisplayLabel: 'Maestro'
