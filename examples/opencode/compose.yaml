# Maestro backend for OpenCode CLI
#
# Usage:
#   1. docker compose up
#   2. Copy opencode.json into your project directory
#   3. Run: opencode
#
# Maestro API available at http://localhost:8080/v1/

services:
  platform:
    image: ghcr.io/altipard/maestro
    ports:
      - "${PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

    configs:
      - source: platform
        target: /config.yaml

    restart: unless-stopped

  extractor:
    image: ghcr.io/altipard/maestro-extractor
    restart: unless-stopped

configs:
  platform:
    content: |
      address: ":8080"

      providers:
        # Ollama — local models (default, no API key needed)
        - type: ollama
          url: http://host.docker.internal:11434
          models:
            qwen3.5:latest:
            nomic-embed-text:

        # OpenRouter — uncomment to add cloud models
        # - type: openrouter
        #   token: $${OPENROUTER_API_KEY}
        #   models:
        #     deepseek-r1:
        #       id: deepseek/deepseek-r1

      extractors:
        text:
          type: text

        default:
          type: grpc
          url: grpc://extractor:50051

      segmenters:
        default:
          type: text
