# Maestro backend for OpenCode CLI
#
# Usage:
#   1. Add your OpenRouter key to .env
#   2. docker compose up
#   3. Copy opencode.json into your project directory
#   4. Run: opencode
#
# Maestro API available at http://localhost:8080/v1/

services:
  platform:
    image: ghcr.io/altipard/maestro
    ports:
      - "${PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env

    configs:
      - source: platform
        target: /config.yaml

    restart: unless-stopped

  extractor:
    image: ghcr.io/altipard/maestro-extractor
    restart: unless-stopped

configs:
  platform:
    content: |
      address: ":8080"

      providers:
        # Ollama — local models
        - type: ollama
          url: http://host.docker.internal:11434
          models:
            qwen3.5:latest:
            nomic-embed-text:

        # OpenRouter — cloud models
        - type: openrouter
          token: $${OPENROUTER_API_KEY}
          models:
            deepseek/deepseek-r1:
            anthropic/claude-sonnet-4:
            google/gemini-2.5-pro-preview:
            openai/gpt-4o:
            nvidia/nemotron-3-super-120b-a12b:free:

      extractors:
        text:
          type: text

        default:
          type: grpc
          url: grpc://extractor:50051

      segmenters:
        default:
          type: text
