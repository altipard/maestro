# Maestro standalone stack — platform + extractor
#
# Usage:
#   docker compose up
#   API available at http://localhost:8080/v1/
#
# Connect any OpenAI-compatible client:
#   - OpenCode CLI
#   - LibreChat (see examples/librechat/)
#   - curl, httpie, etc.

services:
  platform:
    image: ghcr.io/altipard/maestro
    ports:
      - "${PORT:-8080}:8080"

    models:
      - llm
      - embedding

    configs:
      - source: platform
        target: /config.yaml

    restart: unless-stopped

  extractor:
    image: ghcr.io/altipard/maestro-extractor
    restart: unless-stopped

models:
  llm:
    model: ai/qwen3

  embedding:
    model: ai/qwen3-embedding

configs:
  platform:
    content: |
      address: ":8080"

      providers:
        - type: openai-compatible
          url: $${LLM_URL}

          models:
            qwen3:
              id: $${LLM_MODEL}

        - type: openai-compatible
          url: $${EMBEDDING_URL}

          models:
            qwen3-embedding:
              id: $${EMBEDDING_MODEL}

      extractors:
        text:
          type: text

        default:
          type: grpc
          url: grpc://extractor:50051

      segmenters:
        default:
          type: text
